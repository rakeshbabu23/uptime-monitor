services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "9000:9000"
    environment:
      DB_PATH: /data/monitor.db
    volumes:
      - sqlite_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:9000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
